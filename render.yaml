services:
  - type: web
    name: khizex
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn khizex.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "."
      - key: DATABASE_URL
        fromDatabase:
          name: khizex-db
          property: connectionString
    autoDeploy: false
    staticPublishPath: staticfiles

databases:
  - name: khizex-db
    region: oregon
    plan: free